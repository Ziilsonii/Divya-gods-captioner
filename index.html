<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DIVYA — Caption Writer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080608;
    --surface: #100e12;
    --border: #2a2030;
    --gold: #d4a843;
    --gold2: #f0c96a;
    --crimson: #8b1a1a;
    --saffron: #e8621a;
    --text: #e8e0d0;
    --muted: #6b5f7a;
    --card: #0e0c10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* Decorative background */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(212,168,67,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(139,26,26,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Header */
  .header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    position: relative;
    text-align: center;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .om {
    font-size: 2rem;
    color: var(--gold);
    margin-bottom: 6px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--gold);
    line-height: 1;
  }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Form */
  .form-wrap { padding: 24px; }

  .form-group { margin-bottom: 20px; }

  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 8px;
  }

  select, textarea, input[type="text"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
    appearance: none;
  }

  select:focus, textarea:focus, input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px rgba(212,168,67,0.1);
  }

  textarea { resize: none; height: 90px; line-height: 1.6; }

  select option { background: #1a1520; }

  /* Platform pills */
  .pill-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .pill.selected {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(212,168,67,0.06);
  }

  /* God selector */
  .god-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .god-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 6px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }

  .god-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

  .god-btn .name {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .god-btn.selected {
    border-color: var(--gold);
    background: rgba(212,168,67,0.05);
  }

  .god-btn.selected .name { color: var(--gold); }

  /* Generate button */
  .gen-btn {
    width: 100%;
    background: linear-gradient(135deg, #1a1200, #2a1e00);
    border: 1px solid var(--gold);
    border-radius: 3px;
    padding: 16px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 4px;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,0.08), transparent);
    transition: left 0.5s;
  }

  .gen-btn:hover::before { left: 100%; }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 30px;
  }

  .loading.show { display: block; }

  .mandala {
    font-size: 2.5rem;
    animation: spin 3s linear infinite;
    display: inline-block;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* Results */
  .results { padding: 0 24px 24px; display: none; }
  .results.show { display: block; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .results-header {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .results-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .caption-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-bottom: 14px;
    overflow: hidden;
    position: relative;
  }

  .caption-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--saffron));
  }

  .caption-platform {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .platform-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .char-count {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
  }

  .caption-body {
    padding: 16px;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .copy-btn {
    width: 100%;
    background: none;
    border: none;
    border-top: 1px solid var(--border);
    padding: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .copy-btn:hover { color: var(--gold); }
  .copy-btn.copied { color: #4caf50; }

  /* Divider */
  .divider {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin: 4px 0 20px;
    opacity: 0.4;
  }

  .regen-btn {
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .regen-btn:hover { border-color: var(--gold); color: var(--gold); }

  .error-msg {
    background: rgba(139,26,26,0.15);
    border: 1px solid var(--crimson);
    border-radius: 3px;
    padding: 14px;
    font-size: 0.85rem;
    color: #e88;
    text-align: center;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="om">ॐ</div>
  <div class="logo">DIVYA</div>
  <div class="tagline">AI Caption Writer · Divine Reels</div>
</div>

<div class="form-wrap">

  <div class="form-group">
    <label class="form-label">Deity / Subject</label>
    <div class="god-grid">
      <button class="god-btn" onclick="selectGod(this,'Lord Shiva')">
        <span class="icon">🔱</span><span class="name">Shiva</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Lord Vishnu')">
        <span class="icon">🪷</span><span class="name">Vishnu</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Lord Ganesha')">
        <span class="icon">🐘</span><span class="name">Ganesha</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Goddess Durga')">
        <span class="icon">⚔️</span><span class="name">Durga</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Lord Krishna')">
        <span class="icon">🪈</span><span class="name">Krishna</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Lord Hanuman')">
        <span class="icon">🌟</span><span class="name">Hanuman</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Goddess Lakshmi')">
        <span class="icon">✨</span><span class="name">Lakshmi</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'Lord Ram')">
        <span class="icon">🏹</span><span class="name">Ram</span>
      </button>
      <button class="god-btn" onclick="selectGod(this,'custom')">
        <span class="icon">🙏</span><span class="name">Other</span>
      </button>
    </div>
    <input type="text" id="customGod" placeholder="Enter deity name..." style="margin-top:8px;display:none;">
  </div>

  <div class="form-group">
    <label class="form-label">Reel Theme / Scene</label>
    <select id="theme">
      <option value="">Select a theme...</option>
      <option>Divine cosmic form reveal</option>
      <option>Battle / warrior energy</option>
      <option>Peaceful meditation / serenity</option>
      <option>Festival / celebration</option>
      <option>Sacred story / mythology</option>
      <option>Nature & elemental power</option>
      <option>Devotion & bhakti</option>
      <option>Transformation / awakening</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">Platforms</label>
    <div class="pill-group">
      <button class="pill selected" onclick="togglePill(this,'YouTube')">YouTube</button>
      <button class="pill selected" onclick="togglePill(this,'LinkedIn')">LinkedIn</button>
      <button class="pill selected" onclick="togglePill(this,'Instagram')">Instagram</button>
    </div>
  </div>

  <div class="form-group">
    <label class="form-label">Any extra details (optional)</label>
    <textarea id="extraDetails" placeholder="e.g. 3ds Max + Arnold render, AI upscaled, cosmic background, particle effects..."></textarea>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">
    ✦ GENERATE CAPTIONS ✦
  </button>
</div>

<div class="loading" id="loading">
  <div class="mandala">☸</div>
  <div class="loading-text">Channeling divine words...</div>
</div>

<div class="results" id="results"></div>

<script>
  let selectedGodName = '';
  let selectedPlatforms = ['YouTube', 'LinkedIn', 'Instagram'];

  function selectGod(el, name) {
    document.querySelectorAll('.god-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    const customInput = document.getElementById('customGod');
    if (name === 'custom') {
      customInput.style.display = 'block';
      selectedGodName = '';
    } else {
      customInput.style.display = 'none';
      selectedGodName = name;
    }
  }

  document.getElementById('customGod').addEventListener('input', e => {
    selectedGodName = e.target.value;
  });

  function togglePill(el, platform) {
    el.classList.toggle('selected');
    if (el.classList.contains('selected')) {
      if (!selectedPlatforms.includes(platform)) selectedPlatforms.push(platform);
    } else {
      selectedPlatforms = selectedPlatforms.filter(p => p !== platform);
    }
  }

  async function generate() {
    const god = selectedGodName || document.getElementById('customGod').value;
    const theme = document.getElementById('theme').value;
    const extra = document.getElementById('extraDetails').value;

    if (!god) { alert('Please select or enter a deity.'); return; }
    if (!theme) { alert('Please select a theme.'); return; }
    if (selectedPlatforms.length === 0) { alert('Please select at least one platform.'); return; }

    document.getElementById('loading').classList.add('show');
    document.getElementById('results').classList.remove('show');
    document.getElementById('genBtn').disabled = true;

    const hasYT = selectedPlatforms.includes('YouTube');
    const hasIG = selectedPlatforms.includes('Instagram');
    const hasLI = selectedPlatforms.includes('LinkedIn');

    const prompt = `You are a creative scriptwriter specializing in cinematic, spiritually evocative content for Hindu mythology animation reels.

The animator is Zill, a 3D animator from Surat, India who creates AI-enhanced divine animation reels using 3ds Max, Arnold renderer, and AI tools like RunwayML.

Reel details:
- Deity: ${god}
- Theme/Scene: ${theme}
- Extra details: ${extra || 'Cinematic 3D animation with AI-enhanced visuals'}

Tone: Creative, cinematic, deeply evocative. Use poetic language rooted in Hindu philosophy and mythology. Reference specific attributes, weapons, stories, or Sanskrit words relevant to ${god} where appropriate.

Generate the following in valid JSON only (no markdown, no extra text):

{
  ${hasYT ? `"youtube": {
    "title": "A powerful SEO-optimized YouTube video title (max 70 chars, include deity name and key theme, use | or — as separator)",
    "description": "Full YouTube description (200-350 words): start with a 2-line cinematic hook, then describe the animation and its spiritual significance, mention the tools used (3ds Max, Arnold, AI), include a call to action to subscribe, end with 6-8 relevant hashtags",
    "tags": ["array", "of", "20-25", "SEO", "tags", "as", "strings", "mix of broad and niche Hindu mythology + animation keywords"],
    "chapters": "Suggested YouTube chapters as a single string, e.g. 0:00 Intro\\n0:15 The Divine Reveal\\n0:45 Cosmic Form\\n1:10 Outro"
  },` : ''}
  ${hasIG ? `"instagram": {
    "caption": "Short punchy Instagram caption (60-100 words) with emotional impact, line breaks for visual rhythm, 2-3 emojis used meaningfully",
    "hashtags": "A single string of 20-25 Instagram hashtags separated by spaces, mix of popular and niche"
  },` : ''}
  ${hasLI ? `"linkedin": {
    "caption": "Professional yet soulful LinkedIn post (120-200 words) connecting the divine art to creativity and craft. Tell the story behind the animation. Max 5 hashtags at the end."
  }` : '"_": null'}
}`;

    const GEMINI_KEY = 'AIzaSyCQ5sMPXWGppMW-3UWXe9XFR2QKIV7w3BI';
  
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.9, maxOutputTokens: 2000 }
        })
      });

      const data = await response.json();
      const raw = data.candidates[0].content.parts[0].text;
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      renderResults(parsed);
    } catch (err) {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('genBtn').disabled = false;
      document.getElementById('results').innerHTML = `<div class="error-msg">Something went wrong. Please try again.<br><small>${err.message}</small></div>`;
      document.getElementById('results').classList.add('show');
    }
  }

  function renderResults(data) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('genBtn').disabled = false;

    let blocks = [];
    let idx = 0;

    // YouTube blocks
    if (data.youtube) {
      const yt = data.youtube;
      blocks.push(buildCard('▶ YouTube — Title', yt.title, idx++, 'title'));
      blocks.push(buildCard('▶ YouTube — Description', yt.description, idx++, 'description'));
      if (yt.tags && yt.tags.length) {
        const tagsStr = yt.tags.join(', ');
        blocks.push(buildCard('▶ YouTube — Tags', tagsStr, idx++, 'tags'));
        // Tag pills display
        blocks[blocks.length-1] = buildTagsCard(yt.tags, idx-1);
      }
      if (yt.chapters) {
        blocks.push(buildCard('▶ YouTube — Chapters', yt.chapters, idx++, 'chapters'));
      }
      blocks.push('<div class="divider">· · ·</div>');
    }

    // Instagram
    if (data.instagram) {
      blocks.push(buildCard('◈ Instagram — Caption', data.instagram.caption, idx++, 'caption'));
      if (data.instagram.hashtags) {
        blocks.push(buildCard('◈ Instagram — Hashtags', data.instagram.hashtags, idx++, 'hashtags'));
      }
      blocks.push('<div class="divider">· · ·</div>');
    }

    // LinkedIn
    if (data.linkedin) {
      blocks.push(buildCard('in LinkedIn', data.linkedin.caption, idx++, 'post'));
      blocks.push('<div class="divider">· · ·</div>');
    }

    const html = `
      <div class="results-header">✦ Generated Content</div>
      ${blocks.join('')}
      <button class="regen-btn" onclick="generate()">↺ Regenerate All</button>
    `;

    document.getElementById('results').innerHTML = html;
    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function buildCard(label, text, i, type) {
    return `
      <div class="caption-card">
        <div class="caption-platform">
          <span class="platform-tag">${label}</span>
          <span class="char-count">${text.length} chars</span>
        </div>
        <div class="caption-body" id="caption-${i}">${text}</div>
        <button class="copy-btn" id="copy-${i}" onclick="copyCaption(${i})">⊕ Copy</button>
      </div>`;
  }

  function buildTagsCard(tags, i) {
    const tagsStr = tags.join(', ');
    const pills = tags.map(t => `<span style="display:inline-block;background:rgba(212,168,67,0.08);border:1px solid #2a2030;border-radius:2px;padding:3px 8px;margin:3px 3px;font-family:'DM Mono',monospace;font-size:0.65rem;color:#d4a843;">${t}</span>`).join('');
    return `
      <div class="caption-card">
        <div class="caption-platform">
          <span class="platform-tag">▶ YouTube — Tags</span>
          <span class="char-count">${tags.length} tags</span>
        </div>
        <div class="caption-body" id="caption-${i}" style="display:none;">${tagsStr}</div>
        <div style="padding:14px 16px;line-height:1.8;">${pills}</div>
        <button class="copy-btn" id="copy-${i}" onclick="copyCaption(${i})">⊕ Copy All Tags</button>
      </div>`;
  }

  function copyCaption(i) {
    const el = document.getElementById(`caption-${i}`);
    const text = el.innerText || el.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById(`copy-${i}`);
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '⊕ Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
